<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lead Recovery Console</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'%3E%3Crect width='36' height='36' rx='8' fill='%230a2a44'/%3E%3Cpath d='M10 12h16v3H10zm0 5h16v3H10zm0 5h10v3H10z' fill='%23d8efff'/%3E%3C/svg%3E" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="top-header" id="topHeader">
        <div class="brand">Lead Recovery</div>
        <div class="breadcrumb" id="breadcrumbTrail">Organization ▸ Product ▸ Funnel ▸ Lead</div>
        <div class="header-right">
          <button class="ghost" id="themeToggleBtn" aria-label="Switch theme">Theme</button>
          <button class="ghost" id="helpBtn" aria-label="Help">?</button>
          <button class="ghost" id="logoutHeaderBtn" aria-label="Logout">Logout</button>
        </div>
      </header>

      <aside class="activity-bar" id="activityBar">
        <div class="activity-bar_top">
          <button class="activity-btn" data-tab="dashboard" data-path="#/" title="dashboard" aria-label="dashboard">
            <img src="https://img.icons8.com/fluency-systems-regular/48/dashboard-layout.png" alt="" width="20" height="20" loading="lazy" />
          </button>
          <button class="activity-btn" data-tab="customers" data-path="#/customers" title="customers" aria-label="customers">
            <img src="https://img.icons8.com/fluency-systems-regular/48/conference-call.png" alt="" width="20" height="20" loading="lazy" />
          </button>
          <button class="activity-btn" data-tab="funnels" data-path="#/funnels" title="funnels" aria-label="funnels">
            <img src="https://img.icons8.com/fluency-systems-regular/48/workflow.png" alt="" width="20" height="20" loading="lazy" />
          </button>
          <button class="activity-btn" data-tab="calls" data-path="#/calls/active" title="calls" aria-label="calls">
            <img src="https://img.icons8.com/fluency-systems-regular/48/phone-disconnected.png" alt="" width="20" height="20" loading="lazy" />
          </button>
          <button class="activity-btn" data-tab="agents" data-path="#/agents" title="agents" aria-label="agents">
            <img src="https://img.icons8.com/fluency-systems-regular/48/bot.png" alt="" width="20" height="20" loading="lazy" />
          </button>
          <button class="activity-btn" data-tab="analytics" data-path="#/analytics" title="analytics" aria-label="analytics">
            <img src="https://img.icons8.com/fluency-systems-regular/48/combo-chart.png" alt="" width="20" height="20" loading="lazy" />
          </button>
        </div>
        <div class="activity-bar_bottom">
          <button class="activity-btn" data-tab="settings" data-path="#/settings/integrations" title="settings" aria-label="settings">
            <img src="https://img.icons8.com/fluency-systems-regular/48/settings.png" alt="" width="20" height="20" loading="lazy" />
          </button>
          <button class="activity-btn" data-tab="account" data-path="#/account" title="account" aria-label="account">
            <img src="https://img.icons8.com/fluency-systems-regular/48/user.png" alt="" width="20" height="20" loading="lazy" />
          </button>
        </div>
      </aside>

      <aside class="side-panel" id="sidePanel">
        <nav class="side-section" data-tab="dashboard">
          <a class="side-link" href="#/">Overview</a>
        </nav>
        <nav class="side-section" data-tab="customers">
          <a class="side-link" href="#/customers">Customer List</a>
          <a class="side-link" href="#/settings/lead-ingestion">Lead Ingestion</a>
        </nav>
        <nav class="side-section" data-tab="funnels">
          <a class="side-link" href="#/funnels">Products and Funnels</a>
        </nav>
        <nav class="side-section" data-tab="calls">
          <a class="side-link" href="#/calls/active">Active Calls</a>
          <a class="side-link" href="#/calls/log">Call Log</a>
          <a class="side-link" href="#/calls/make">Make Call</a>
        </nav>
        <nav class="side-section" data-tab="agents">
          <a class="side-link" href="#/agents">Agent Personas</a>
        </nav>
        <nav class="side-section" data-tab="analytics">
          <a class="side-link" href="#/analytics">Performance</a>
          <a class="side-link" href="#/analytics/logs">Logs</a>
        </nav>
        <nav class="side-section" data-tab="settings">
          <a class="side-link" href="#/settings/integrations">Integrations</a>
          <a class="side-link" href="#/settings/scheduling">Scheduling</a>
          <a class="side-link" href="#/settings/lead-ingestion">Lead Ingestion</a>
          <a class="side-link" href="#/settings/security">Security</a>
        </nav>
        <nav class="side-section" data-tab="account">
          <a class="side-link" href="#/account">Profile</a>
        </nav>
      </aside>

      <main class="main-panel" id="mainContent" aria-live="polite"></main>
      <footer class="status-bar" id="statusBar">
        <span>Status: online</span>
        <span>Role: <span id="statusRole">guest</span></span>
      </footer>
    </div>
    <div id="toastRegion" class="toast-region" aria-live="polite" aria-atomic="true"></div>
    <script type="module" src="./js/bootstrap.js"></script>
  </body>
</html>
